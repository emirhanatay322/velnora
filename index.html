<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velnora | Premium Dijital Ajans</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#111;
            color:white;
        }

        header{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            background:linear-gradient(135deg,#111,#1f1f1f);
        }

        h1{
            font-size:70px;
            margin-bottom:20px;
        }

        p{
            font-size:22px;
            color:#ccc;
        }

        button{
            margin-top:35px;
            padding:15px 40px;
            border:none;
            border-radius:8px;
            background:white;
            color:black;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#dcdcdc;
        }
    </style>

</head>
<body>

<header>

<h1>VELNORA</h1>

<p>Premium Grafik Tasarım • Web Tasarım • Yazılım</p>

<button>Yakında Hizmetinizde</button>

</header>

</body>
</html>
